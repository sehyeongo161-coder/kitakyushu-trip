<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>우리의 기타큐슈 여행</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { -webkit-font-smoothing: antialiased; background-color: #f8fafc; display: flex; justify-content: center; font-family: sans-serif; }
        button, a, div { -webkit-tap-highlight-color: transparent; outline: none; }
        .edit-input { width: 100%; background: #f8fafc; border: 1px dashed #cbd5e1; border-radius: 4px; padding: 4px 6px; font-size: inherit; font-family: inherit; color: inherit; font-weight: inherit; transition: all 0.2s; }
        .edit-input:focus { outline: 2px solid #f472b6; border-color: transparent; background: white; }
        #loading-screen { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; align-items: center; justify-content: center; color: #f472b6; font-weight: bold; flex-direction: column; }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="animate-bounce mb-4 text-4xl">🌸</div>
        <div>데이터 동기화 중...</div>
    </div>

    <div id="app-container" class="w-full max-w-md bg-[#FAFAFA] min-h-screen shadow-2xl relative pb-24 overflow-x-hidden">
        <header class="bg-gradient-to-br from-pink-100 via-rose-50 to-blue-50 px-6 pt-12 pb-8 rounded-b-[40px] shadow-sm relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-pink-200 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
            <div class="absolute top-10 -left-10 w-32 h-32 bg-blue-200 rounded-full mix-blend-multiply filter blur-2xl opacity-50"></div>
            
            <div class="relative z-10 flex justify-between items-start">
                <div>
                    <div class="flex items-center text-pink-500 mb-2">
                        <i data-lucide="heart" class="w-[18px] h-[18px] fill-pink-500 text-pink-500 mr-2"></i>
                        <span class="text-sm font-semibold tracking-wider">KITAKYUSHU TRIP</span>
                        <span id="dday-badge" class="ml-2 px-2.5 py-0.5 bg-pink-500 text-white text-xs font-bold rounded-full shadow-sm">계산중...</span>
                    </div>
                    <h1 class="text-3xl font-extrabold text-gray-800 leading-tight">우리의<br />기타큐슈 여행</h1>
                </div>
                <div class="flex items-center space-x-2 mt-2">
                    <button id="undo-btn" class="bg-white/80 p-2 rounded-full shadow-sm text-gray-400 hover:text-indigo-500 transition-colors backdrop-blur-sm disabled:opacity-30" onclick="window.undoAction()" disabled>
                        <i data-lucide="undo-2" class="w-5 h-5"></i>
                    </button>
                    <button id="edit-toggle-btn" class="bg-white/80 p-2 rounded-full shadow-sm text-gray-600 hover:text-pink-500 transition-colors backdrop-blur-sm" onclick="window.toggleEditMode()">
                        <i data-lucide="edit-3" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </header>

        <main class="px-5 -mt-4 relative z-20">
            <div id="itinerary-view">
                <div id="trip-container"></div>
            </div>

            <div id="muckkit-view" class="hidden pb-8">
                <div class="flex items-center mb-6 px-1 mt-4">
                    <div class="bg-pink-100 p-2 rounded-xl mr-3 shadow-sm border border-pink-200/50">
                        <i data-lucide="utensils" class="w-6 h-6 text-pink-600"></i>
                    </div>
                    <h2 class="text-2xl font-extrabold text-gray-800 tracking-tight">먹킷리스트</h2>
                </div>
                <div id="muckkit-container" class="space-y-6 mt-2"></div>
            </div>

            <div id="checklist-view" class="hidden pb-8">
                <div id="checklist-container" class="bg-white rounded-3xl shadow-sm border border-pink-50/50 p-5 mt-4"></div>
            </div>
        </main>

        <!-- 하단 네비게이션 -->
        <div class="fixed bottom-0 w-full max-w-md bg-white border-t border-gray-100 p-4 flex justify-around items-center text-gray-400 pb-6 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.05)] z-50">
            <button id="nav-itinerary" class="flex flex-col items-center transition-all" onclick="window.switchTab('itinerary')">
                <i data-lucide="calendar-days" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">일정표</span>
            </button>
            <button id="nav-muckkit" class="flex flex-col items-center transition-all" onclick="window.switchTab('muckkit')">
                <i data-lucide="utensils" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">먹킷리스트</span>
            </button>
            <button id="nav-checklist" class="flex flex-col items-center transition-all" onclick="window.switchTab('checklist')">
                <i data-lucide="list-todo" class="w-6 h-6 mb-1"></i>
                <span class="text-[10px] font-bold">체크리스트</span>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC56qGPGXTnYBpQNdrdv2gt6TlkPvzTz-8",
            authDomain: "kitakyushu-trip.firebaseapp.com",
            projectId: "kitakyushu-trip",
            storageBucket: "kitakyushu-trip.firebasestorage.app",
            messagingSenderId: "883462812612",
            appId: "1:883462812612:web:ebb0479fcafb1c807f2a91"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let tripData = [];
        let muckkitData = [];
        let checklistData = [];
        let openDays = [1, 2]; 
        let expandedMemos = {}; 
        let isEditMode = false;
        let currentTab = 'itinerary';
        let historyStack = [];

        const getIconColor = (type) => {
            const colors = { plane: 'text-blue-500', ship: 'text-cyan-500', train: 'text-indigo-600', bus: 'text-emerald-500', utensils: 'text-orange-500', 'shopping-bag': 'text-pink-500', camera: 'text-teal-500', heart: 'text-rose-500', coffee: 'text-amber-600', 'ice-cream': 'text-pink-400' };
            return colors[type] || 'text-pink-400';
        };

        async function saveData() {
            const docRef = doc(db, 'trips', 'kitakyushu');
            await setDoc(docRef, { 
                tripData: JSON.stringify(tripData), 
                muckkitData: JSON.stringify(muckkitData),
                checklistData: JSON.stringify(checklistData) 
            });
        }

        window.saveHistory = function() {
            historyStack.push({ tripData: JSON.parse(JSON.stringify(tripData)), muckkitData: JSON.parse(JSON.stringify(muckkitData)), checklistData: JSON.parse(JSON.stringify(checklistData)) });
            if(historyStack.length > 20) historyStack.shift();
            updateUndoButtonState();
        }

        window.undoAction = function() {
            if (historyStack.length === 0) return;
            const prevState = historyStack.pop();
            tripData = prevState.tripData; muckkitData = prevState.muckkitData; checklistData = prevState.checklistData;
            saveData(); render();
        };

        function updateUndoButtonState() {
            const btn = document.getElementById('undo-btn');
            if (historyStack.length > 0) { btn.removeAttribute('disabled'); btn.classList.add('text-indigo-500'); }
            else { btn.setAttribute('disabled', 'true'); btn.classList.remove('text-indigo-500'); }
        }

        window.toggleEditMode = function() {
            isEditMode = !isEditMode;
            expandedMemos = {}; 
            const btn = document.getElementById('edit-toggle-btn');
            if (isEditMode) { btn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i>'; } 
            else { btn.innerHTML = '<i data-lucide="edit-3" class="w-5 h-5"></i>'; saveData(); }
            render();
        };

        window.switchTab = function(tab) { currentTab = tab; window.scrollTo(0,0); render(); };
        window.toggleDay = function(id) { if (openDays.includes(id)) openDays = openDays.filter(d => d !== id); else openDays.push(id); render(); };

        window.changeIcon = function(dayId, activityId) {
            const types = ['plane', 'ship', 'train', 'bus', 'utensils', 'shopping-bag', 'camera', 'heart', 'coffee'];
            const day = tripData.find(d => String(d.id) === String(dayId));
            const act = day.activities.find(a => String(a.id) === String(activityId));
            if (act) { window.saveHistory(); const cur = types.indexOf(act.type); act.type = types[(cur + 1) % types.length]; render(); }
        };

        window.updateData = function(dayId, activityId, field, value) {
            const day = tripData.find(d => String(d.id) === String(dayId));
            if (day) { window.saveHistory(); if (activityId === null) day[field] = value; else { const act = day.activities.find(a => String(a.id) === String(activityId)); if (act) act[field] = value; } }
        };

        window.toggleMemo = function(e, id, state) {
            if (e) e.stopPropagation();
            expandedMemos[id] = (expandedMemos[id] === state) ? null : state;
            render();
        };

        window.saveMemo = function(e, id, type) {
            if (e) e.stopPropagation();
            const val = document.getElementById(`memo-input-${id}`).value;
            window.saveHistory();
            if (type === 'muck') {
                const item = muckkitData.find(m => String(m.id) === String(id));
                if (item) item.memo = val;
            } else {
                tripData.forEach(day => {
                    const act = day.activities.find(a => String(a.id) === String(id));
                    if (act) act.memo = val;
                });
            }
            saveData(); expandedMemos[id] = 'view'; render();
        };

        window.updateMuckkit = function(id, field, value) {
            const item = muckkitData.find(m => String(m.id) === String(id));
            if (item) { window.saveHistory(); item[field] = value; }
        };

        window.addMuckkit = function(category) {
            window.saveHistory();
            muckkitData.push({ id: Date.now(), category: category, name: "새로운 " + category, tags: "", memo: "", mapUrl: "" });
            render();
        };

        window.deleteMuckkit = function(id) {
            window.saveHistory();
            muckkitData = muckkitData.filter(m => String(m.id) !== String(id));
            render();
        };

        window.deleteActivity = function(dayId, actId) {
            window.saveHistory();
            const day = tripData.find(d => String(d.id) === String(dayId));
            if (day) { day.activities = day.activities.filter(a => String(a.id) !== String(actId)); render(); }
        };

        window.addActivity = function(dayId) {
            window.saveHistory();
            const day = tripData.find(d => String(d.id) === String(dayId));
            if (day) { day.activities.push({ id: Date.now(), time: "시간", title: "새 일정", type: "heart", desc: "", memo: "" }); render(); }
        };

        window.toggleChecklistItem = function(id) {
            if (isEditMode) return;
            const item = checklistData.find(i => String(i.id) === String(id));
            if (item) { window.saveHistory(); item.checked = !item.checked; saveData(); render(); }
        };
        window.updateChecklistData = function(id, val) { window.saveHistory(); const item = checklistData.find(i => String(i.id) === String(id)); if (item) item.text = val; };
        window.deleteChecklistItem = function(id) { window.saveHistory(); checklistData = checklistData.filter(i => String(i.id) !== String(id)); render(); };
        window.addChecklistItem = function() { window.saveHistory(); checklistData.push({ id: 'c' + Date.now(), text: "", checked: false }); render(); };

        function render() {
            document.getElementById('itinerary-view').style.display = currentTab === 'itinerary' ? 'block' : 'none';
            document.getElementById('muckkit-view').style.display = currentTab === 'muckkit' ? 'block' : 'none';
            document.getElementById('checklist-view').style.display = currentTab === 'checklist' ? 'block' : 'none';

            // 하단 내비게이션 탭 상태 반영 (이 부분 수정됨)
            const navs = { itinerary: 'nav-itinerary', muckkit: 'nav-muckkit', checklist: 'nav-checklist' };
            Object.keys(navs).forEach(key => {
                const el = document.getElementById(navs[key]);
                if (el) {
                    if (key === currentTab) {
                        el.classList.add('text-pink-500');
                        el.classList.remove('text-gray-400');
                    } else {
                        el.classList.remove('text-pink-500');
                        el.classList.add('text-gray-400');
                    }
                }
            });

            // 먹킷리스트 렌더링
            const muckContainer = document.getElementById('muckkit-container');
            muckContainer.innerHTML = '';
            ["식당", "카페", "군것질"].forEach(cat => {
                const items = muckkitData.filter(m => m.category === cat);
                let iconType = cat === '카페' ? 'coffee' : (cat === '군것질' ? 'ice-cream' : 'utensils');
                let catHtml = `<div class="mb-6"><div class="flex items-center space-x-2 bg-white border border-pink-100 px-4 py-1.5 rounded-full w-max mb-3"><i data-lucide="${iconType}" class="w-4 h-4 text-pink-500"></i><h3 class="text-[13px] font-extrabold text-pink-600">${cat}</h3></div><div class="space-y-3">`;
                items.forEach(item => {
                    if (isEditMode) {
                        catHtml += `<div class="bg-white p-4 rounded-2xl border-2 border-pink-100 shadow-sm"><div class="flex gap-2 mb-3"><i data-lucide="${iconType}" class="w-4 h-4 text-pink-400 mt-1"></i><input type="text" class="edit-input flex-1 font-bold text-sm bg-pink-50/30" value="${item.name}" onchange="window.updateMuckkit('${item.id}', 'name', this.value)"></div><input type="text" class="edit-input w-full text-xs text-gray-500 mb-2" value="${item.tags}" placeholder="#태그 입력" onchange="window.updateMuckkit('${item.id}', 'tags', this.value)"><div class="flex justify-between items-center"><div class="flex-1 mr-2 flex bg-gray-50 rounded p-1 border"><i data-lucide="map-pin" class="w-3 h-3 text-gray-400 mx-1"></i><input type="text" class="edit-input flex-1 text-[10px] text-blue-500 border-none bg-transparent p-0" value="${item.mapUrl}" placeholder="구글맵 URL" onchange="window.updateMuckkit('${item.id}', 'mapUrl', this.value)"></div><button onclick="window.deleteMuckkit('${item.id}')" class="text-red-300"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div></div>`;
                    } else {
                        const memoState = expandedMemos[item.id];
                        const tags = item.tags ? item.tags.split(',').map(t => `<span class="bg-pink-50 text-pink-600 text-[10px] font-bold px-2 py-0.5 rounded-md mr-1 border border-pink-100">#${t.trim()}</span>`).join('') : `<span class="text-gray-300 text-[10px]">#태그 입력</span>`;
                        const memoBadge = item.memo ? `<span class="absolute top-3 right-3 w-2 h-2 bg-pink-500 rounded-full ring-2 ring-white"></span>` : '';
                        let memoHtml = memoState === 'view' ? `<div class="mt-3 pt-3 border-t" onclick="event.stopPropagation()"><div class="flex justify-between items-center mb-1"><span class="text-xs font-bold text-gray-400">메모</span><button onclick="window.toggleMemo(event, '${item.id}', 'edit')" class="p-1 hover:bg-pink-50 rounded"><i data-lucide="pencil" class="w-3 h-3 text-gray-400"></i></button></div><p class="text-[13px] text-gray-700 whitespace-pre-wrap bg-slate-50 p-3 rounded-xl border">${item.memo || '메모가 없습니다.'}</p></div>` : (memoState === 'edit' ? `<div class="mt-3 pt-3 border-t" onclick="event.stopPropagation()"><textarea id="memo-input-${item.id}" class="w-full bg-slate-50 border rounded-xl p-3 text-[13px] min-h-[80px]">${item.memo || ''}</textarea><div class="flex justify-end space-x-2 mt-2"><button onclick="window.toggleMemo(event, '${item.id}', 'view')" class="px-2 py-1 text-xs bg-gray-100 rounded">취소</button><button onclick="window.saveMemo(event, '${item.id}', 'muck')" class="px-2 py-1 text-xs bg-pink-500 text-white rounded">저장</button></div></div>` : '');
                        catHtml += `<div class="bg-white p-4 rounded-2xl border shadow-sm hover:border-pink-200 cursor-pointer relative" onclick="window.toggleMemo(event, '${item.id}', 'view')">${memoBadge}<div class="flex justify-between items-center"><div class="flex items-start space-x-3"><div class="bg-pink-50 p-2.5 rounded-xl"><i data-lucide="${iconType}" class="w-5 h-5 text-pink-500"></i></div><div><h4 class="font-extrabold text-gray-800">${item.name}</h4><div class="mt-1.5 flex flex-wrap gap-1">${tags}</div></div></div>${item.mapUrl ? `<a href="${item.mapUrl}" target="_blank" onclick="event.stopPropagation()" class="p-2.5 bg-blue-50 text-blue-500 rounded-full"><i data-lucide="map-pin" class="w-4 h-4"></i></a>` : ''}</div>${memoHtml}</div>`;
                    }
                });
                if (isEditMode) catHtml += `<button onclick="window.addMuckkit('${cat}')" class="w-full py-3 border-2 border-dashed border-pink-200 rounded-xl text-pink-500 text-xs font-bold mt-2 hover:bg-pink-50">+ ${cat} 추가</button>`;
                muckContainer.innerHTML += catHtml + `</div></div>`;
            });

            // 일정표 렌더링
            const tripContainer = document.getElementById('trip-container');
            tripContainer.innerHTML = '';
            tripData.forEach(day => {
                const isOpen = openDays.includes(day.id);
                const card = document.createElement('div');
                card.className = "bg-white rounded-3xl shadow-sm border border-pink-50/50 mb-4 overflow-hidden";
                let themeHtml = isEditMode ? `<input type="text" class="edit-input mt-1 font-bold text-gray-800" value="${day.theme}" onchange="window.updateData('${day.id}', null, 'theme', this.value)">` : `<h3 class="mt-1 font-bold text-gray-800">${day.theme}</h3>`;
                card.innerHTML = `<div class="p-5 flex justify-between items-center ${!isEditMode ? 'cursor-pointer' : ''}" onclick="${!isEditMode ? `window.toggleDay(${day.id})` : ''}">
                    <div class="flex-1 mr-4"><span class="text-xs font-bold text-pink-500 bg-pink-100 px-3 py-1 rounded-full">${day.day}</span>${themeHtml}</div>
                    <i data-lucide="${isOpen ? 'chevron-up' : 'chevron-down'}" class="text-gray-400"></i>
                </div>`;
                if (isOpen) {
                    let actHtml = `<div class="px-5 pb-6 pt-2 border-t border-pink-50/30"><div class="relative border-l-[1.5px] border-pink-100 ml-4 space-y-6 mt-4">`;
                    day.activities.forEach(act => {
                        if (isEditMode) {
                            actHtml += `<div class="relative pl-6"><div class="absolute -left-[17px] top-0 w-[34px] h-[34px] rounded-full bg-white border-2 border-pink-200 flex items-center justify-center z-10 cursor-pointer" onclick="window.changeIcon('${day.id}', '${act.id}')"><i data-lucide="${act.type}" class="w-4 h-4 text-pink-600"></i></div><div class="bg-slate-50 p-3 rounded-xl border"><div class="flex gap-2 mb-2"><input type="text" class="edit-input w-16 text-xs text-pink-500 font-bold" value="${act.time}" onchange="window.updateData('${day.id}', '${act.id}', 'time', this.value)"><input type="text" class="edit-input flex-1 text-sm font-bold" value="${act.title}" onchange="window.updateData('${day.id}', '${act.id}', 'title', this.value)"></div><input type="text" class="edit-input w-full text-xs text-gray-500 mb-2" value="${act.desc || ''}" onchange="window.updateData('${day.id}', '${act.id}', 'desc', this.value)" placeholder="설명"><button onclick="window.deleteActivity('${day.id}', '${act.id}')" class="text-red-400 text-[10px]">삭제</button></div></div>`;
                        } else {
                            const memoState = expandedMemos[act.id];
                            const memoBadge = act.memo ? `<span class="absolute top-3 right-3 w-2 h-2 bg-pink-500 rounded-full ring-2 ring-white"></span>` : '';
                            let memoHtml = memoState === 'view' ? `<div class="mt-3 pt-3 border-t" onclick="event.stopPropagation()"><div class="flex justify-between items-center mb-1"><span class="text-xs font-bold text-gray-400">상세 메모</span><button onclick="window.toggleMemo(event, '${act.id}', 'edit')" class="p-1 hover:bg-pink-50 rounded"><i data-lucide="pencil" class="w-3 h-3 text-gray-400"></i></button></div><p class="text-[13px] text-gray-700 whitespace-pre-wrap bg-slate-50 p-3 rounded-xl border">${act.memo || '메모가 없습니다.'}</p></div>` : (memoState === 'edit' ? `<div class="mt-3 pt-3 border-t" onclick="event.stopPropagation()"><textarea id="memo-input-${act.id}" class="w-full bg-slate-50 border rounded-xl p-3 text-[13px] min-h-[80px]">${act.memo || ''}</textarea><div class="flex justify-end space-x-2 mt-2"><button onclick="window.toggleMemo(event, '${act.id}', 'view')" class="px-2 py-1 text-xs bg-gray-100 rounded">취소</button><button onclick="window.saveMemo(event, '${act.id}', 'trip')" class="px-2 py-1 text-xs bg-pink-500 text-white rounded">저장</button></div></div>` : '');
                            actHtml += `<div class="relative pl-6"><div class="absolute -left-[17px] top-0 w-[34px] h-[34px] rounded-full bg-white border shadow-sm flex items-center justify-center z-10"><i data-lucide="${act.type}" class="w-4 h-4 ${getIconColor(act.type)}"></i></div><div class="p-4 rounded-2xl bg-white border shadow-sm hover:border-pink-200 cursor-pointer relative" onclick="window.toggleMemo(event, '${act.id}', 'view')">${memoBadge}<div class="flex justify-between items-center"><div class="flex-1"><div class="text-[11px] font-bold text-pink-600 mb-1">${act.time}</div><h4 class="font-bold text-gray-800 text-[15px]">${act.title}</h4>${act.desc ? `<p class="text-xs text-gray-500 mt-1">${act.desc}</p>` : ''}</div><i data-lucide="chevron-right" class="w-4 h-4 text-gray-200 ${memoState ? 'rotate-90' : ''}"></i></div>${memoHtml}</div></div>`;
                        }
                    });
                    if (isEditMode) actHtml += `<button onclick="window.addActivity('${day.id}')" class="w-full py-2 border-2 border-dashed border-slate-200 rounded-xl text-slate-400 text-xs mt-4">+ 일정 추가</button>`;
                    card.innerHTML += actHtml + `</div></div>`;
                }
                tripContainer.appendChild(card);
            });

            // 체크리스트 렌더링
            const chkContainer = document.getElementById('checklist-container');
            chkContainer.innerHTML = `<div class="flex items-center mb-5"><div class="bg-pink-100 p-2 rounded-xl mr-3"><i data-lucide="list-todo" class="w-5 h-5 text-pink-600"></i></div><h2 class="text-xl font-bold text-gray-800">체크리스트</h2></div>`;
            checklistData.forEach(item => {
                if (isEditMode) chkContainer.innerHTML += `<div class="flex items-center bg-slate-50 p-2.5 rounded-xl border mb-2"><input type="text" class="edit-input flex-1 mr-3 text-sm" value="${item.text}" onchange="window.updateChecklistData('${item.id}', this.value)" placeholder="항목 입력"><button onclick="window.deleteChecklistItem('${item.id}')" class="text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button></div>`;
                else chkContainer.innerHTML += `<div class="flex items-center p-3 rounded-xl ${item.checked ? 'bg-slate-50' : 'bg-white shadow-sm border'} mb-2 cursor-pointer" onclick="window.toggleChecklistItem('${item.id}')"><i data-lucide="${item.checked ? 'check-square' : 'square'}" class="w-5 h-5 mr-3 ${item.checked ? 'text-pink-400' : 'text-gray-300'}"></i><span class="${item.checked ? 'text-gray-400 line-through' : 'text-gray-800 font-medium'}">${item.text}</span></div>`;
            });
            if (isEditMode) chkContainer.innerHTML += `<button onclick="window.addChecklistItem()" class="w-full mt-3 py-2 border-2 border-dashed border-pink-200 text-pink-500 font-bold rounded-xl">+ 항목 추가</button>`;

            lucide.createIcons();
            const dday = new Date(2026, 5, 28);
            const diff = Math.ceil((dday - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
            document.getElementById('dday-badge').innerText = diff > 0 ? `D-${diff}` : (diff === 0 ? "D-Day 🎉" : `D+${Math.abs(diff)}`);
            updateUndoButtonState();
        }

        onSnapshot(doc(db, 'trips', 'kitakyushu'), (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                tripData = JSON.parse(data.tripData || "[]");
                muckkitData = JSON.parse(data.muckkitData || "[]");
                checklistData = JSON.parse(data.checklistData || "[]");
                render();
            }
            document.getElementById('loading-screen').style.display = 'none';
        });
    </script>
</body>
</html>
